name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le déploiement sur le VPS
        run: |
          # Utilise l'IP directe avec SNI pour contourner les problèmes DNS
          RESULT=$(curl -s --max-time 120 \
            --resolve construiro.com:443:185.98.139.38 \
            -X POST \
            -d "secret=${{ secrets.DEPLOY_SECRET }}" \
            https://construiro.com/deploy-receiver.php)
          echo "Résultat: $RESULT"
          echo "$RESULT" | grep -q "DEPLOY_OK" && echo "✅ Déploiement réussi" || (echo "❌ Échec: $RESULT" && exit 1)
