name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances npm
        run: npm ci

      - name: Build Vite (React + Tailwind)
        run: npm run build

      - name: Créer l'archive des assets compilés
        run: |
          cd public
          zip -r ../assets.zip build/
          echo "Taille du zip : $(du -sh ../assets.zip | cut -f1)"

      - name: Git pull via ancien endpoint (bootstrap deploy-v2.php)
        run: |
          curl -s --max-time 60 \
            --resolve construiro.com:443:185.98.139.38 \
            -X POST \
            -d "secret=${{ secrets.DEPLOY_SECRET }}" \
            https://construiro.com/deploy-receiver.php || true
          echo "Git pull déclenché (résultat ignoré)"

      - name: Déployer assets + env + migrations + seeders
        run: |
          RESULT=$(curl -s --max-time 180 \
            --resolve construiro.com:443:185.98.139.38 \
            -X POST \
            -F "secret=${{ secrets.DEPLOY_SECRET }}" \
            -F "groq_key=${{ secrets.GROQ_API_KEY }}" \
            -F "assets=@assets.zip;type=application/zip" \
            https://construiro.com/deploy-v2.php)
          echo "Résultat: $RESULT"
          echo "$RESULT" | grep -q "DEPLOY_OK" && echo "✅ Déploiement réussi" || (echo "❌ Échec: $RESULT" && exit 1)

      - name: Afficher les logs VPS
        if: always()
        run: |
          echo "=== Logs deploy.log ==="
          curl -s --max-time 30 \
            --resolve construiro.com:443:185.98.139.38 \
            "https://construiro.com/deploy-log.php?secret=${{ secrets.DEPLOY_SECRET }}" | tail -40
